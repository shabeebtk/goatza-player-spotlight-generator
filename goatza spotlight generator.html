<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goatza · Spotlight Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  /* ---- tool UI uses Goatza dark tokens ---- */
  :root{
    --bg:#0d110e; --surface:#131814; --raised:#1a211b; --border:#263029;
    --brand:#00c96e; --brand-600:#00B562; --ink:#eef2ee; --text:#eef2ee;
    --sub:#7a9480; --muted:#556655; --onbrand:#0a0a0a;
    --ui:'Outfit',system-ui,Arial,sans-serif; --disp:'Bebas Neue','Arial Narrow',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--ui);
       -webkit-font-smoothing:antialiased;padding:34px 20px 80px;line-height:1.5}
  .wrap{max-width:1120px;margin:0 auto}

  header{display:flex;align-items:center;gap:14px;margin-bottom:6px}
  header .mark{width:40px;height:40px;border-radius:9px;background:#0a0a0a;display:grid;place-items:center;border:1px solid var(--border)}
  header .mark img{width:30px;height:30px}
  header h1{font-family:var(--disp);font-size:34px;letter-spacing:.04em;line-height:1}
  header .brand{color:var(--brand)}
  .lead{color:var(--sub);font-size:14.5px;margin:0 0 26px 54px}

  .grid{display:grid;grid-template-columns:380px 1fr;gap:28px;align-items:start}
  @media(max-width:880px){.grid{grid-template-columns:1fr}}

  .panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px}
  .panel h2{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--sub);font-weight:700;margin-bottom:16px}

  label{display:block;font-size:12px;font-weight:600;color:var(--sub);margin:0 0 6px;letter-spacing:.02em}
  .field{margin-bottom:14px}
  input,textarea,select{width:100%;background:var(--raised);border:1px solid var(--border);color:var(--text);
    border-radius:10px;padding:12px 13px;font-family:var(--ui);font-size:15px;outline:none;transition:border-color .15s,box-shadow .15s}
  input:focus,textarea:focus,select:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(0,201,110,.16)}
  textarea{resize:vertical;min-height:78px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}

  .seg{display:flex;gap:8px;background:var(--raised);border:1px solid var(--border);padding:5px;border-radius:12px}
  .seg button{flex:1;border:0;background:transparent;color:var(--sub);font-family:var(--ui);font-weight:700;
    font-size:13.5px;padding:10px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:.15s}
  .seg button.on{background:var(--brand);color:var(--onbrand)}
  .seg .dotL{width:13px;height:13px;border-radius:50%;background:#f5f7f5;border:1px solid #cdd}
  .seg .dotD{width:13px;height:13px;border-radius:50%;background:#0d110e;border:1px solid #444}

  .go{margin-top:18px;width:100%;border:0;background:var(--brand);color:var(--onbrand);
    font-family:var(--ui);font-weight:800;font-size:16px;letter-spacing:.02em;padding:15px;border-radius:12px;cursor:pointer;transition:.15s}
  .go:hover{background:#16d97c}
  .go:disabled{opacity:.5;cursor:not-allowed}
  .zip{margin-top:10px;width:100%;border:1px solid var(--border);background:transparent;color:var(--text);
    font-family:var(--ui);font-weight:700;font-size:15px;padding:13px;border-radius:12px;cursor:pointer}
  .zip:hover{border-color:var(--brand);color:var(--brand)}
  .zip:disabled{opacity:.4;cursor:not-allowed}
  .status{margin-top:12px;font-size:13px;color:var(--sub);min-height:18px;text-align:center}

  .previews{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
  @media(max-width:520px){.previews{grid-template-columns:1fr}}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
  .card .cap{display:flex;justify-content:space-between;align-items:center;padding:9px 13px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--sub);font-weight:700;border-bottom:1px solid var(--border)}
  .card .cap a{color:var(--brand);text-decoration:none;letter-spacing:.02em;text-transform:none;font-size:12px}
  .card canvas{width:100%;height:auto;display:block;background:#000}
  .empty{grid-column:1/-1;border:1px dashed var(--border);border-radius:14px;padding:48px 20px;text-align:center;color:var(--muted);font-size:14px}
  .empty b{color:var(--sub)}
</style>
</head>

    <h1>GOATZA <span class="brand">SPOTLIGHT</span> GENERATOR</h1>
  </header>
  <p class="lead">Fill the player in, pick a theme, generate a 4-slide carousel, download the ZIP. Add the player photo later in your editor.</p>

  <div class="grid">
    <!-- FORM -->
    <div class="panel">
      <h2>Player details</h2>
      <div class="field"><label>Name</label><input id="f_name" placeholder="Arjun Nair" value="Arjun Nair"></div>
      <div class="two">
        <div class="field"><label>Age</label><input id="f_age" placeholder="19" value="19"></div>
        <div class="field"><label>Sport</label><input id="f_sport" placeholder="Football" value="Football"></div>
      </div>
      <div class="two">
        <div class="field"><label>Position</label><input id="f_pos" placeholder="Striker" value="Striker"></div>
        <div class="field"><label>Location</label><input id="f_loc" placeholder="Kochi, Kerala" value="Kochi, Kerala"></div>
      </div>
      <div class="field"><label>Instagram username</label><input id="f_ig" placeholder="arjun.nair9" value="arjun.nair9"></div>
      <div class="field"><label>Short description</label><textarea id="f_desc" placeholder="One or two lines about the player.">Self-taught striker from the streets of Fort Kochi. District top scorer two seasons running, now looking for a club that will back him.</textarea></div>

      <div class="field" style="margin-top:4px">
        <label>Theme</label>
        <div class="seg" id="themeSeg">
          <button data-theme="dark" class="on"><span class="dotD"></span>Dark</button>
          <button data-theme="light"><span class="dotL"></span>Light</button>
        </div>
      </div>

      <button class="go" id="genBtn">Generate spotlight</button>
      <button class="zip" id="zipBtn" disabled>Download ZIP</button>
      <div class="status" id="status">Ready.</div>
    </div>

    <!-- PREVIEW -->
    <div class="previews" id="previews">
      <div class="empty">Your 4 slides will appear here.<br><b>Cover · Profile · Story · Call-to-action</b></div>
    </div>
  </div>
</div>

<script>
// ================= THEME TOKENS (from Goatza globals.css) =================
const THEMES = {
  dark:  { bg:'#0d110e', surface:'#131814', raised:'#1a211b', border:'#263029',
           brand:'#00c96e', ink:'#eef2ee', text:'#eef2ee', sub:'#7a9480', muted:'#556655',
           onBrand:'#0a0a0a', logo:'#eef2ee', grad0:'#161d18', grad1:'#0b0f0c' },
  light: { bg:'#f5f7f5', surface:'#ffffff', raised:'#eef2ee', border:'#e2ddd6',
           brand:'#00B562', ink:'#0a0a0a', text:'#111111', sub:'#555555', muted:'#999999',
           onBrand:'#ffffff', logo:'#0a0a0a', grad0:'#ffffff', grad1:'#e9efe9' },
  // CTA slide stays dark in BOTH themes (project rule: --color-cta-bg always dark)
  cta:   { bg:'#080f09', brand:'#00c96e', text:'#eef2ee', sub:'#9fb0a3', onBrand:'#0a0a0a', logo:'#eef2ee' }
};

const W=1080, H=1350, M=84;
const DISP="'Bebas Neue','Arial Narrow',sans-serif";
const UI="'Outfit',system-ui,Arial,sans-serif";

let theme='dark';
let logoImg=null, blobs=[];
const SLIDES=['cover','profile','story','cta'];
const CAPS=['Cover','Profile','Story','Call-to-action'];

// ---------- helpers ----------
const $=id=>document.getElementById(id);
const up=s=>(s||'').toUpperCase();
const val=id=>$(id).value.trim();

function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

function setLS(ctx,px){ if('letterSpacing' in ctx){ctx.letterSpacing=px+'px';} }

// tinted logo -> returns a canvas of the mark in given color
function tintedLogo(color){
  const c=document.createElement('canvas'); c.width=logoImg.width; c.height=logoImg.height;
  const x=c.getContext('2d'); x.drawImage(logoImg,0,0);
  x.globalCompositeOperation='source-in'; x.fillStyle=color; x.fillRect(0,0,c.width,c.height);
  return c;
}
function drawLogo(ctx,color,x,y,size){ const t=tintedLogo(color); ctx.drawImage(t,x,y,size,size); }

// top-right Goatza lockup (mark + wordmark), right edge = rx, vertical center cy
function lockup(ctx,t,rx,cy){
  const word="GOATZA"; ctx.font=`30px ${DISP}`; setLS(ctx,2); ctx.textAlign='right'; ctx.textBaseline='middle';
  ctx.fillStyle=t.ink||t.text; ctx.fillText(word,rx,cy);
  const ww=ctx.measureText(word).width; setLS(ctx,0);
  const s=44; drawLogo(ctx,t.logo, rx-ww-12-s, cy-s/2, s);
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';   // reset so later text isn't right-aligned
}

function wrap(ctx,text,maxW){
  const words=(text||'').split(/\s+/); const lines=[]; let line='';
  for(const w of words){ const test=line?line+' '+w:w;
    if(ctx.measureText(test).width>maxW && line){lines.push(line);line=w;} else line=test; }
  if(line)lines.push(line); return lines;
}
// fit display text to width, return font size
function fitDisplay(ctx,text,maxW,start,min){
  let s=start; ctx.font=`${s}px ${DISP}`;
  while(s>min && ctx.measureText(text).width>maxW){ s-=4; ctx.font=`${s}px ${DISP}`; }
  return s;
}

function dots(ctx,t,active){
  const n=4,r=6,gap=20,cx=W/2,y=H-46; const total=(n-1)*gap;
  for(let i=0;i<n;i++){ ctx.beginPath(); ctx.arc(cx-total/2+i*gap,y,r,0,7); 
    ctx.fillStyle=i===active?(t.brand):(t.muted||'#555'); ctx.globalAlpha=i===active?1:.5; ctx.fill(); ctx.globalAlpha=1; }
}

// ================= SLIDE RENDERERS =================
function renderSlide(kind,d){
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const ctx=cv.getContext('2d'); ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  const t = kind==='cta'? THEMES.cta : THEMES[theme];

  // base bg
  if(kind==='cover'){ const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,t.grad0); g.addColorStop(1,t.grad1); ctx.fillStyle=g; }
  else ctx.fillStyle=t.bg;
  ctx.fillRect(0,0,W,H);

  if(kind==='cover')   coverSlide(ctx,t,d);
  if(kind==='profile') profileSlide(ctx,t,d);
  if(kind==='story')   storySlide(ctx,t,d);
  if(kind==='cta')     ctaSlide(ctx,t,d);
  return cv;
}

function coverSlide(ctx,t,d){
  // ghosted position watermark (also marks where the photo goes)
  ctx.save();
  ctx.textAlign='center'; ctx.fillStyle=t.brand; ctx.globalAlpha=theme==='light'?.10:.12;
  let wm=up(d.pos||d.sport||'PLAYER'); let s=fitDisplay(ctx,wm,W*1.15,360,140);
  ctx.font=`${s}px ${DISP}`; setLS(ctx,2); ctx.fillText(wm, W/2, H*0.40); setLS(ctx,0);
  ctx.restore();

  // bottom legibility gradient
  const g=ctx.createLinearGradient(0,H*0.45,0,H); g.addColorStop(0,'rgba(0,0,0,0)');
  g.addColorStop(1, theme==='light'?'rgba(233,239,233,0.0)':'rgba(8,11,9,0.55)');
  if(theme!=='light'){ ctx.fillStyle=g; ctx.fillRect(0,0,W,H); }

  // top bar
  ctx.fillStyle=t.brand; ctx.font=`26px ${UI}`; ctx.font=`700 26px ${UI}`; setLS(ctx,4);
  ctx.textAlign='left'; ctx.textBaseline='middle'; ctx.fillText('PLAYER SPOTLIGHT', M, 108); setLS(ctx,0);
  lockup(ctx,t, W-M, 108);

  // bottom block — anchored from the bottom so nothing clips
  const maxW=W-2*M;
  ctx.fillStyle=t.ink; const ns=fitDisplay(ctx,up(d.name),maxW,150,60);
  const nameBase=H-230, nameTop=nameBase-ns;

  // pill (above the name)
  ctx.font=`700 24px ${UI}`; setLS(ctx,1.5);
  const pill=up((d.pos||'')+(d.age?'  ·  '+d.age+' YRS':'')); const pw=ctx.measureText(pill).width;
  const pillTop=nameTop-18-52;
  ctx.fillStyle=t.brand; roundRect(ctx,M,pillTop,pw+44,52,26); ctx.fill();
  ctx.fillStyle=THEMES[theme].onBrand; ctx.textBaseline='middle'; ctx.fillText(pill,M+22,pillTop+27); setLS(ctx,0);

  // name
  ctx.textBaseline='alphabetic'; ctx.fillStyle=t.ink; ctx.font=`${ns}px ${DISP}`;
  ctx.fillText(up(d.name),M,nameBase);

  // sub + handle
  ctx.font=`500 30px ${UI}`; ctx.fillStyle=t.sub;
  ctx.fillText([d.sport,d.loc].filter(Boolean).join('  ·  '), M, nameBase+46);
  if(d.ig){ ctx.font=`700 30px ${UI}`; ctx.fillStyle=t.brand; ctx.fillText('@'+d.ig, M, nameBase+90); }

  dots(ctx,t,0);
}

function profileSlide(ctx,t,d){
  ctx.fillStyle=t.brand; ctx.font=`700 26px ${UI}`; setLS(ctx,4); ctx.textBaseline='middle';
  ctx.fillText('THE PROFILE', M,108); setLS(ctx,0); lockup(ctx,t,W-M,108);

  ctx.fillStyle=t.sub; ctx.font=`500 30px ${UI}`; ctx.textBaseline='alphabetic';
  ctx.fillText(up(d.name)+(d.pos?'  ·  '+d.pos:''), M, 250);

  // 2x2 stat grid
  const cells=[['AGE',d.age||'—'],['SPORT',d.sport||'—'],['POSITION',d.pos||'—'],['LOCATION',d.loc||'—']];
  const gx=M, gy=300, gw=W-2*M, gap=18, cw=(gw-gap)/2, ch=210, vg=18;
  for(let i=0;i<4;i++){ const col=i%2,row=(i/2)|0; const cx=gx+col*(cw+gap), cy=gy+row*(ch+vg);
    ctx.fillStyle=t.surface; roundRect(ctx,cx,cy,cw,ch,16); ctx.fill();
    ctx.strokeStyle=t.border; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle=t.muted; ctx.font=`700 22px ${UI}`; setLS(ctx,3); ctx.textAlign='left';
    ctx.fillText(cells[i][0], cx+32, cy+62); setLS(ctx,0);
    ctx.fillStyle=t.ink; const vs=fitDisplay(ctx,up(cells[i][1]),cw-64,84,38);
    ctx.font=`${vs}px ${DISP}`; ctx.fillText(up(cells[i][1]), cx+30, cy+150);
  }

  // instagram strip
  const sy=gy+2*ch+vg+28;
  ctx.fillStyle=t.brand; roundRect(ctx,M,sy,W-2*M,108,16); ctx.fill();
  ctx.fillStyle=THEMES[theme].onBrand; ctx.font=`700 26px ${UI}`; setLS(ctx,2); ctx.textBaseline='middle';
  ctx.fillText('FOLLOW THE JOURNEY', M+34, sy+40); setLS(ctx,0);
  ctx.font=`800 40px ${UI}`; ctx.fillText('@'+(d.ig||'goatza.sports'), M+34, sy+76);

  ctx.fillStyle=t.muted; ctx.font=`500 24px ${UI}`; ctx.textBaseline='alphabetic';
  ctx.fillText('Spotted by Goatza  ·  @goatza.sports', M, H-90);
  dots(ctx,t,1);
}

function storySlide(ctx,t,d){
  ctx.fillStyle=t.brand; ctx.font=`700 26px ${UI}`; setLS(ctx,4); ctx.textBaseline='middle';
  ctx.fillText('THE STORY', M,108); setLS(ctx,0); lockup(ctx,t,W-M,108);

  // big quote mark
  ctx.fillStyle=t.ink; ctx.globalAlpha=.12; ctx.font=`260px ${DISP}`; ctx.textBaseline='alphabetic';
  ctx.fillText('\u201C', M-10, 420); ctx.globalAlpha=1;

  // description
  ctx.fillStyle=t.text; let size=58; ctx.font=`600 ${size}px ${UI}`;
  let lines=wrap(ctx,d.desc||'',W-2*M);
  while(lines.length>7 && size>34){ size-=4; ctx.font=`600 ${size}px ${UI}`; lines=wrap(ctx,d.desc||'',W-2*M); }
  let y=470; const lh=size*1.34;
  for(const ln of lines){ ctx.fillText(ln,M,y); y+=lh; }

  // byline
  y+=40; ctx.fillStyle=t.brand; roundRect(ctx,M,y,70,6,3); ctx.fill();
  y+=64; ctx.fillStyle=t.ink; ctx.font=`64px ${DISP}`; ctx.fillText(up(d.name),M,y);
  y+=42; ctx.fillStyle=t.sub; ctx.font=`500 28px ${UI}`;
  ctx.fillText([d.pos,d.loc].filter(Boolean).join('  ·  '),M,y);

  dots(ctx,t,2);
}

function ctaSlide(ctx,t,d){
  // subtle brand grid glow
  ctx.fillStyle='rgba(0,201,110,0.05)';
  for(let gx=0;gx<W;gx+=90) ctx.fillRect(gx,0,1,H);
  for(let gy=0;gy<H;gy+=90) ctx.fillRect(0,gy,W,1);

  ctx.textAlign='center';
  drawLogo(ctx,t.logo, W/2-78, 340, 156);
  ctx.fillStyle=t.text; ctx.font=`120px ${DISP}`; ctx.textBaseline='alphabetic';
  setLS(ctx,1); ctx.fillText('GET SPOTTED', W/2, 660); setLS(ctx,0);

  ctx.fillStyle=t.brand; roundRect(ctx,W/2-40,706,80,7,4); ctx.fill();

  ctx.fillStyle=t.sub; ctx.font=`500 32px ${UI}`;
  const para=wrap(ctx,'Goatza is building the home for sports talent. Players, clubs and scouts — one place.',W-360);
  let y=790; for(const ln of para){ ctx.fillText(ln,W/2,y); y+=46; }

  ctx.fillStyle=t.text; ctx.font=`800 40px ${UI}`; setLS(ctx,2); ctx.fillText('@GOATZA.SPORTS',W/2,y+54); setLS(ctx,0);

  // pill
  ctx.font=`800 28px ${UI}`; setLS(ctx,2); const lbl='TAG A BALLER  ·  JOIN THE WAITLIST';
  const pw=ctx.measureText(lbl).width; ctx.fillStyle=t.brand;
  roundRect(ctx,W/2-(pw+72)/2, y+100, pw+72, 76, 38); ctx.fill();
  ctx.fillStyle=t.onBrand; ctx.textBaseline='middle'; ctx.fillText(lbl,W/2,y+139); setLS(ctx,0);
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  dots(ctx,{brand:t.brand,muted:'#3a4a3e'},3);
}

// ================= GENERATE + PREVIEW =================
function collect(){ return {
  name:val('f_name')||'Player', age:val('f_age'), sport:val('f_sport'),
  pos:val('f_pos'), loc:val('f_loc'), ig:val('f_ig').replace(/^@/,''), desc:val('f_desc') }; }

async function generate(){
  const d=collect(); $('status').textContent='Rendering…'; $('genBtn').disabled=true;
  await document.fonts.ready;
  try{ await document.fonts.load(`80px 'Bebas Neue'`); await document.fonts.load(`700 30px 'Outfit'`);}catch(e){}

  const pv=$('previews'); pv.innerHTML=''; blobs=[];
  for(let i=0;i<SLIDES.length;i++){
    const cv=renderSlide(SLIDES[i],d);
    // preview card
    const card=document.createElement('div'); card.className='card';
    const disp=document.createElement('canvas'); disp.width=W; disp.height=H;
    disp.getContext('2d').drawImage(cv,0,0);
    card.innerHTML=`<div class="cap"><span>${i+1} · ${CAPS[i]}</span><a href="#" data-i="${i}">Save PNG</a></div>`;
    card.appendChild(disp); pv.appendChild(card);
    const blob=await new Promise(r=>cv.toBlob(r,'image/png')); blobs.push(blob);
  }
  // individual save links
  pv.querySelectorAll('a[data-i]').forEach(a=>a.onclick=e=>{e.preventDefault();
    const i=+a.dataset.i; saveBlob(blobs[i], fileBase(d)+'_'+(i+1)+'_'+SLIDES[i]+'.png');});

  $('zipBtn').disabled=false; $('genBtn').disabled=false;
  $('status').textContent='Done — 4 slides ready.';
}

function fileBase(d){ return 'goatza_'+(d.name||'player').toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,''); }
function saveBlob(blob,name){ const u=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=u; a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(u),1500); }

async function downloadZip(){
  const d=collect(); $('status').textContent='Packing ZIP…';
  const files=[];
  for(let i=0;i<blobs.length;i++){ const buf=new Uint8Array(await blobs[i].arrayBuffer());
    files.push({name:fileBase(d)+'_'+(i+1)+'_'+SLIDES[i]+'.png', data:buf}); }
  const zip=makeZip(files); saveBlob(zip, fileBase(d)+'_spotlight_'+theme+'.zip');
  $('status').textContent='ZIP downloaded ✓';
}

// ================= minimal ZIP (store, no deps) =================
const CRC=(()=>{const t=new Uint32Array(256);for(let n=0;n<256;n++){let c=n;for(let k=0;k<8;k++)c=c&1?0xEDB88320^(c>>>1):c>>>1;t[n]=c>>>0;}return t;})();
function crc32(b){let c=0xFFFFFFFF;for(let i=0;i<b.length;i++)c=CRC[(c^b[i])&0xFF]^(c>>>8);return (c^0xFFFFFFFF)>>>0;}
function makeZip(files){
  const enc=new TextEncoder(); const chunks=[]; const central=[]; let offset=0;
  const u16=v=>[v&255,(v>>8)&255]; const u32=v=>[v&255,(v>>8)&255,(v>>16)&255,(v>>24)&255];
  for(const f of files){
    const name=enc.encode(f.name); const crc=crc32(f.data); const sz=f.data.length;
    const lh=[].concat(u32(0x04034b50),u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(sz),u32(sz),u16(name.length),u16(0));
    chunks.push(new Uint8Array(lh), name, f.data);
    const ch=[].concat(u32(0x02014b50),u16(20),u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(sz),u32(sz),u16(name.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(offset));
    central.push(new Uint8Array(ch), name);
    offset += lh.length+name.length+sz;
  }
  let cdSize=0; for(const c of central) cdSize+=c.length;
  const cdOffset=offset;
  const eocd=new Uint8Array([].concat(u32(0x06054b50),u16(0),u16(0),u16(files.length),u16(files.length),u32(cdSize),u32(cdOffset),u16(0)));
  return new Blob([...chunks,...central,eocd],{type:'application/zip'});
}

// ================= wire up =================
$('themeSeg').addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b)return;
  theme=b.dataset.theme; [...$('themeSeg').children].forEach(c=>c.classList.toggle('on',c===b));
  if(blobs.length) generate(); });
$('genBtn').addEventListener('click',generate);
$('zipBtn').addEventListener('click',downloadZip);

// preload logo then allow generate
logoImg=new Image(); logoImg.onload=()=>{ $('status').textContent='Ready.'; };
logoImg.src=$('hmark').src;
